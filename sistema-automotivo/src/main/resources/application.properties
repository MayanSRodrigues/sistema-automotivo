# =====================================================
# CONFIGURAÇÕES DA APLICAÇÃO - Sistema Automotivo
# =====================================================

# Nome da aplicação
spring.application.name=sistema-automotivo

# =====================================================
# BANCO DE DADOS MySQL
# =====================================================
# Altere 'root' e 'sua_senha' para suas credenciais
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_automotivo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
# update: atualiza o schema sem apagar dados
# create-drop: recria o banco a cada execução (bom para testes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================================
# SERVIDOR
# =====================================================
server.port=8080

# Exibe erros detalhados (desative em produção)
server.error.include-message=always
server.error.include-binding-errors=always
